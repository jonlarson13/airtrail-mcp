name: Release

on:
  push:
    branches:
      - main
    paths:
      - manifest.json

permissions:
  contents: write
  pull-requests: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compare manifest version to previous commit
        id: check
        run: |
          NEW=$(node -p "require('./manifest.json').version")
          OLD=$(git show HEAD^:manifest.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null || echo "")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package MCPB bundle
        run: npx mcpb pack . "airtrail-mcp-$VERSION.mcpb"

      - name: Tag release
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Build release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].body // ""')
          gh api "repos/${{ github.repository }}/releases/generate-notes" -f tag_name="v$VERSION" --jq '.body' > generated-notes.md

          CUSTOM_NOTES=$(printf '%s' "$PR_BODY" | perl -0777 -ne '
            if (/<!--\s*RN Start\s*-->(.*?)<!--\s*RN Stop\s*-->/s) {
              my $t = $1;
              $t =~ s/^\s+|\s+$//g;
              print $t;
            }
          ')

          if [ -n "$CUSTOM_NOTES" ]; then
            printf '%s\n\n' "$CUSTOM_NOTES" > release-notes.md
            cat generated-notes.md >> release-notes.md
          else
            cp generated-notes.md release-notes.md
          fi

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v$VERSION" "airtrail-mcp-$VERSION.mcpb" \
            --title "v$VERSION" \
            --notes-file release-notes.md
